quarkus.http.host=0.0.0.0
quarkus.http.port=8082

# Hard limits / safety
quarkus.http.limits.max-body-size=25M

# Observability
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.binder.http-server.enabled=true
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true

# JSON logs are easier in cluster environments; keep plain by default.
# quarkus.log.console.json=true

# Service configuration (env-overridable)
validator.max-stderr-bytes=16384
validator.max-concurrency=4
validator.cli.jar.path=data/validator_cli.jar
validator.cli.jar.download-url=https://github.com/hapifhir/org.hl7.fhir.core/releases/latest/download/validator_cli.jar

