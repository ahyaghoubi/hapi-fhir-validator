services:
  fhir-validator:
    build:
      context: .
      dockerfile: Dockerfile
    image: hapi-fhir-validator:local
    container_name: hapi-fhir-validator
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_HTTP_PORT: 8082
      JAVA_TOOL_OPTIONS: -Xms256m -Xmx1536m -XX:+UseG1GC
      VALIDATOR_MAX_CONCURRENCY: 2
      VALIDATOR_CLI_JAR_PATH: data/validator_cli.jar
      VALIDATOR_CLI_JAR_DOWNLOAD_URL: https://github.com/hapifhir/org.hl7.fhir.core/releases/latest/download/validator_cli.jar
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  fhir-validator-ui:
    image: node:20-alpine
    container_name: fhir-validator-ui
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install --cache .npm-cache && npm run gen:types && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: "http://135.220.74.18:8082"
    volumes:
      - ./ui:/app
    depends_on:
      - fhir-validator
